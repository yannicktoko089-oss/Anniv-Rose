<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Rose !</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #111122;
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden; /* Pour que les coeurs ne fassent pas scroller la page */
            position: relative;
        }

        /* L'arrière-plan avec les coeurs animés */
        .heart-area {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; /* Derrière tout le reste */
        }

        .heart {
            position: absolute;
            color: rgba(255, 107, 173, 0.5); /* Rose transparent */
            user-select: none;
            animation: moveUp 6s linear infinite;
        }

        @keyframes moveUp {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* La carte de message - Blindée pour l'affichage */
        .card {
            background-color: #222244; /* Fond solide pour être visible */
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff6bad;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10; /* Devant les coeurs */
        }

        h1 {
            color: #ff6bad;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-confetti {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background-color: #ff6bad;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }
        
        .btn-confetti:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="heart-area" id="hearts"></div>

    <div class="card">
        <h1>Joyeux anniversaire Rose ! 🌹</h1>
        <p>Une petite surprise digitale pour une personne exceptionnelle (et parfois un peu pénible mais on t'aime quand même).</p>
        <p><strong>Profite bien de ta journée, tu le mérites bien !</strong></p>
        
        <button class="btn-confetti" onclick="lancerConfetti()">Clique ici ! 🥳</button>
    </div>

    <script>
        // --- Script 1 : Les Coeurs en arrière-plan ---
        const area = document.getElementById('hearts');
        function createHeart() {
            const heart = document.createElement('div');
            heart.className = 'heart';
            heart.innerHTML = '❤';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's'; // Vitesse aléatoire
            heart.style.fontSize = (Math.random() * 10 + 15) + 'px';
            area.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 6000); // Supprime après l'animation
        }
        setInterval(createHeart, 300); // En crée un nouveau toutes les 300ms

        // --- Script 2 : Les Confettis au clic ---
        function lancerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff6bad', '#ffffff', '#ffedbc']
            });
        }
    </script>

</body>
</html>
