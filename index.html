<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Rose !</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a2e; /* Fond bleu nuit */
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .card {
            background: #252545; /* Fond solide pour être sûr de le voir */
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #ff6bad;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 {
            color: #ff6bad;
            margin-bottom: 15px;
            font-size: 1.8rem;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn-confetti {
            padding: 15px 25px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: #ff6bad;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Joyeux anniversaire Rose ! 🌹</h1>
        <p>Une petite surprise digitale pour une personne exceptionnelle (et parfois un peu pénible mais on t'aime quand même).</p>
        <p><strong>Profite bien de ta journée, tu le mérites bien !</strong></p>
        
        <button class="btn-confetti" onclick="lancerConfetti()">Clique ici ! 🥳</button>
    </div>

    <script>
        function lancerConfetti() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff6bad', '#ffffff', '#ffedbc']
            });
        }
    </script>

</body>
</html>
