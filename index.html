
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joyeux Anniversaire Rose !</title>
    <style>
        :root {
            --rose-color: #ff6bad;
            --soft-bg: #1a1a2e;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--soft-bg);
            color: white;
            margin: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Animation des petits coeurs en arrière-plan */
        .hearts {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
        }

        .heart {
            position: absolute;
            color: var(--rose-color);
            opacity: 0.5;
            animation: float 6s infinite ease-in;
        }

        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 85%;
            animation: fadeIn 1.5s ease-out;
        }

        h1 {
            color: var(--rose-color);
            font-size: 2.2rem;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 107, 173, 0.5);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .highlight {
            font-style: italic;
            font-size: 0.9rem;
            opacity: 0.7;
            display: block;
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hearts" id="heart-container"></div>

    <div class="card">
        <h1>Joyeux anniversaire Rose ! 🌹</h1>
        <p>
            Une petite surprise digitale pour une personne exceptionnelle... 
            <span class="highlight">(et parfois un peu pénible mais on t'aime quand même).</span>
        </p>
        <p><strong>Profite bien de ta journée, tu le mérites bien !</strong></p>
    </div>

    <script>
        // Un petit script pour créer des coeurs aléatoires
        const container = document.getElementById('heart-container');
        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            container.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }
        setInterval(createHeart, 400);
    </script>

</body>
</html>
